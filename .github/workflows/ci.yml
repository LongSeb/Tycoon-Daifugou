name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  engine-tests:
    name: Engine tests (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --package-path Packages/TycoonDaifugouKit
      - name: Test
        run: swift test --package-path Packages/TycoonDaifugouKit

  app-build:
    name: App build + tests (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
            Packages/TycoonDaifugouKit/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build app
        run: |
          xcodebuild \
            -workspace TycoonDaifugou.xcworkspace \
            -scheme TycoonDaifugou \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            build-for-testing | xcpretty || exit ${PIPESTATUS[0]}
      - name: Run app tests
        run: |
          xcodebuild \
            -workspace TycoonDaifugou.xcworkspace \
            -scheme TycoonDaifugou \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            test-without-building | xcpretty || exit ${PIPESTATUS[0]}